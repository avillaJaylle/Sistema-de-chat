<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | ChatSchool</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 flex flex-col min-height-screen">

  <header class="bg-blue-800 text-white p-4 shadow-md">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold flex items-center gap-2">
        <img src="img/icone.png" alt="SchoolChat Icon" class="h-6 w-6 rounded-full shadow-md">ChatSchool
      </h1>
    </div>
  </header>

  <main class="flex-grow flex items-center justify-center p-6">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
      <h2 class="text-2xl font-semibold text-center mb-6 text-slate-700">Acessar Sistema</h2>
      <div class="space-y-4">
        <input type="text" id="usuario" placeholder="Usuário"
          class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        <input type="password" id="senha" placeholder="Senha"
          class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        <button onclick="login()"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-300">Entrar</button>
      </div>
    </div>
  </main>

  <footer class="bg-white border-t border-slate-200 p-6 text-slate-600 text-sm">
    <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
      <div class="flex items-center gap-3">
        <img src="img/logo-ifrn.png" alt="Logo IFRN" class="h-10">
        <p>IFRN Campus Santa Cruz</p>
      </div>
      <div class="text-center">
        <p class="font-semibold">Trabalho de Programação para Internet</p>
        <p>Prof. Marcelo Figueiredo Barbosa Júnior</p>
      </div>
      <ul class="text-right list-none">
        <li class="font-bold">Desenvolvedores:</li>
        <li>Ávilla Jaylle de Souza Ferreira</li>
        <li>Carlos André Campelo Araújo</li>
        <li>Maria Camilly Victória de Souza Silva</li>
        <li>Maria Jainara da Silva Filho</li>
      </ul>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>

</html>
